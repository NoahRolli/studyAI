# Dependabot — Automatische Sicherheits-Updates
# Prüft wöchentlich ob Dependencies veraltet oder unsicher sind
# Erstellt automatisch Pull Requests auf GitHub
#
# Docs: https://docs.github.com/en/code-security/dependabot

version: 2

updates:
  # Python Backend — requirements.txt
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    # Max 5 PRs gleichzeitig, sonst wird es unübersichtlich
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps):"

  # Node Frontend — package.json
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps):"

  # GitHub Actions — CI/CD Workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(ci):"
