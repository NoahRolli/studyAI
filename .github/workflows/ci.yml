# ============================================
# pallas – CI Pipeline
# Läuft bei jedem Push auf main und bei Pull Requests
# ============================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # --- Backend: Python Linting & Tests ---
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest

      - name: Lint with ruff
        run: ruff check .

      - name: Run tests
        run: pytest --tb=short -q
        continue-on-error: true  # Tests kommen noch, soll Pipeline nicht blockieren

