# Pallas Docker Compose — Olymp-Server Deployment
# SQLite-Datenbanken liegen auf dem LUKS-verschlüsselten Tresor
# Auth-Config wird read-only gemountet
# network_mode: host — Container teilt Host-Netzwerk (für Ollama-Zugriff)
# Sensible Werte (IPs, CORS) in docker-compose.override.yml (nicht auf GitHub)

services:
  pallas:
    build: .
    container_name: pallas
    restart: unless-stopped
    network_mode: host
    volumes:
      # SQLite-Datenbanken auf dem verschlüsselten Tresor
      - /mnt/tresor/pallas/data:/data
      # Auth-Config (read-only, gleiches System wie Olymp Dashboard)
      - /etc/olymp:/etc/olymp:ro
    environment:
      # Datenbank-Pfade zeigen auf das gemountete Volume
      - PALLAS_DB_PATH=/data/pallas.db
      - JOURNAL_DB_PATH=/data/journal.db
      # Storage für Uploads (Dokumente, etc.)
      - PALLAS_STORAGE_DIR=/data/storage
      # Ollama Fallback — localhost (Server)
      - OLLAMA_BASE_URL=http://localhost:11434
      # Auth-Config Pfad (im Container)
      - AUTH_CONFIG_PATH=/etc/olymp/auth.json
